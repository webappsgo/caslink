{{template "base.html" .}}

{{define "content"}}
<div class="page-container">
    <nav class="breadcrumb">
        <a href="/dashboard" class="breadcrumb-link">Dashboard</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Plans</span>
    </nav>

    <div class="page-header">
        <h1 class="page-title">Choose Your Plan</h1>
        <p class="page-subtitle">All plans include full feature access</p>
    </div>

    <div class="pricing-grid">
        {{range .Plans}}
        <div class="pricing-card">
            <h3>{{.DisplayName}}</h3>
            <div class="plan-price">${{.PriceMonthly}}/mo</div>
            <ul class="plan-features">
                {{range .Features}}
                <li>{{.}}</li>
                {{end}}
            </ul>
            <button class="btn btn-primary" onclick="selectPlan('{{.ID}}')">Select</button>
        </div>
        {{end}}
    </div>
</div>
{{end}}
