{{template "base.html" .}}

{{define "content"}}
<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">Invoice History</h1>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Invoice #</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {{range .Invoices}}
                <tr>
                    <td>{{.Number}}</td>
                    <td>{{.Date}}</td>
                    <td>${{.Amount}}</td>
                    <td>{{.Status}}</td>
                    <td>
                        <a href="/billing/invoices/{{.ID}}/download">Download</a>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
