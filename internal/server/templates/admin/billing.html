{{template "base.html" .}}

{{define "content"}}
<div class="page-container">
    <nav class="breadcrumb">
        <a href="/admin" class="breadcrumb-link">Admin</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Billing</span>
    </nav>

    <div class="page-header">
        <h1 class="page-title">Billing Configuration</h1>
    </div>

    <form id="billing-form" class="settings-form">
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="enabled" {{if .Billing.Enabled}}checked{{end}}>
                <span>Enable Billing System</span>
            </label>
        </div>

        <div class="form-group">
            <label class="form-label">Provider</label>
            <select name="provider" class="form-select">
                <option value="none">None</option>
                <option value="stripe" {{if eq .Billing.Provider "stripe"}}selected{{end}}>Stripe</option>
                <option value="paypal" {{if eq .Billing.Provider "paypal"}}selected{{end}}>PayPal</option>
                <option value="paddle" {{if eq .Billing.Provider "paddle"}}selected{{end}}>Paddle</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Currency</label>
            <select name="currency" class="form-select">
                <option value="USD" {{if eq .Billing.Currency "USD"}}selected{{end}}>USD</option>
                <option value="EUR" {{if eq .Billing.Currency "EUR"}}selected{{end}}>EUR</option>
                <option value="GBP" {{if eq .Billing.Currency "GBP"}}selected{{end}}>GBP</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save Configuration</button>
    </form>
</div>
{{end}}
