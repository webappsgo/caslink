{{template "base.html" .}}

{{define "content"}}
<div class="page-container">
    <nav class="breadcrumb">
        <a href="/admin" class="breadcrumb-link">Admin</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Settings</span>
    </nav>

    <div class="page-header">
        <h1 class="page-title">Server Settings</h1>
    </div>

    <form id="settings-form" class="settings-grid">
        <div class="settings-section">
            <h2 class="section-title">General</h2>
            <div class="form-group">
                <label class="form-label">Brand Name</label>
                <input type="text" name="brand_name" class="form-input" value="{{.Config.BrandName}}">
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enable_registration" {{if .Config.EnableRegistration}}checked{{end}}>
                    <span>Enable User Registration</span>
                </label>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enable_anonymous_urls" {{if .Config.EnableAnonymousURLs}}checked{{end}}>
                    <span>Allow Anonymous URL Creation</span>
                </label>
            </div>
        </div>

        <div class="settings-section">
            <h2 class="section-title">URL Settings</h2>
            <div class="form-group">
                <label class="form-label">Minimum Random Length</label>
                <input type="number" name="min_random_length" class="form-input" value="{{.Config.MinRandomLength}}" min="3" max="20">
            </div>
            <div class="form-group">
                <label class="form-label">Default Expiration</label>
                <select name="default_expiration" class="form-select">
                    <option value="never" {{if eq .Config.DefaultExpiration "never"}}selected{{end}}>Never</option>
                    <option value="1h" {{if eq .Config.DefaultExpiration "1h"}}selected{{end}}>1 Hour</option>
                    <option value="24h" {{if eq .Config.DefaultExpiration "24h"}}selected{{end}}>24 Hours</option>
                    <option value="7d" {{if eq .Config.DefaultExpiration "7d"}}selected{{end}}>7 Days</option>
                    <option value="30d" {{if eq .Config.DefaultExpiration "30d"}}selected{{end}}>30 Days</option>
                </select>
            </div>
        </div>

        <div class="settings-section">
            <h2 class="section-title">Features</h2>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enable_analytics" {{if .Config.EnableAnalytics}}checked{{end}}>
                    <span>Enable Analytics</span>
                </label>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enable_qr_codes" {{if .Config.EnableQRCodes}}checked{{end}}>
                    <span>Enable QR Codes</span>
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>
</div>
{{end}}
