{{template "base.html" .}}

{{define "content"}}
<div class="page-container">
    <nav class="breadcrumb">
        <a href="/admin" class="breadcrumb-link">Admin</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Database</span>
    </nav>

    <div class="page-header">
        <h1 class="page-title">Database Configuration</h1>
    </div>

    <div class="database-info">
        <h2>Current Database</h2>
        <dl class="info-list">
            <div><dt>Type:</dt><dd>{{.Database.Type}}</dd></div>
            <div><dt>Status:</dt><dd class="status-{{.Database.Status}}">{{.Database.Status}}</dd></div>
            <div><dt>Version:</dt><dd>{{.Database.Version}}</dd></div>
            <div><dt>Size:</dt><dd>{{.Database.Size}}</dd></div>
        </dl>
        <button class="btn btn-secondary" onclick="testConnection()">Test Connection</button>
        <button class="btn btn-secondary" onclick="backupDatabase()">Backup Database</button>
    </div>
</div>
{{end}}
