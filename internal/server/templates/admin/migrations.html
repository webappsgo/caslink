{{template "base.html" .}}

{{define "content"}}
<div class="page-container">
    <nav class="breadcrumb">
        <a href="/admin" class="breadcrumb-link">Admin</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Migrations</span>
    </nav>

    <div class="page-header">
        <h1 class="page-title">Database Migrations</h1>
        <button class="btn btn-primary" onclick="runMigrations()">Run Pending Migrations</button>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Migration</th>
                    <th>Status</th>
                    <th>Applied At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {{range .Migrations}}
                <tr>
                    <td>{{.Name}}</td>
                    <td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
                    <td>{{if .AppliedAt}}{{.AppliedAt | formatDate}}{{else}}-{{end}}</td>
                    <td>
                        {{if eq .Status "applied"}}
                        <button class="btn-icon" onclick="rollback('{{.ID}}')" title="Rollback">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
                            </svg>
                        </button>
                        {{end}}
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
