{{template "base.html" .}}

{{define "content"}}
<div class="page-container">
    <nav class="breadcrumb">
        <a href="/dashboard" class="breadcrumb-link">Dashboard</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">QR Codes</span>
    </nav>

    <div class="page-header">
        <h1 class="page-title">QR Code Generator</h1>
        <p class="page-subtitle">Create customizable QR codes for your short URLs</p>
    </div>

    <div class="qr-generator-grid">
        <div class="qr-config-panel">
            <div class="form-section">
                <h3 class="section-title">Select URL</h3>
                <select id="url-select" class="form-select">
                    <option value="">Choose a short URL...</option>
                    {{range .URLs}}
                    <option value="{{.ID}}">{{.ID}} - {{if .Title}}{{.Title}}{{else}}{{.OriginalURL}}{{end}}</option>
                    {{end}}
                </select>
            </div>

            <div class="form-section">
                <h3 class="section-title">QR Code Settings</h3>

                <div class="form-group">
                    <label class="form-label">Size</label>
                    <input type="range" id="qr-size" min="100" max="1000" value="300" step="50" class="form-range">
                    <div class="range-value"><span id="size-value">300</span>px</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Format</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="format" value="png" checked>
                            <span>PNG</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="format" value="svg">
                            <span>SVG</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="format" value="pdf">
                            <span>PDF</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Style</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="style" value="square" checked>
                            <span>Square</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="style" value="rounded">
                            <span>Rounded</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="style" value="circle">
                            <span>Circle</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Foreground Color</label>
                    <div class="color-input-group">
                        <input type="color" id="fg-color" value="#000000" class="color-input">
                        <input type="text" id="fg-color-text" value="#000000" class="form-input" pattern="^#[0-9A-Fa-f]{6}$">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Background Color</label>
                    <div class="color-input-group">
                        <input type="color" id="bg-color" value="#ffffff" class="color-input">
                        <input type="text" id="bg-color-text" value="#ffffff" class="form-input" pattern="^#[0-9A-Fa-f]{6}$">
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-logo">
                        <span>Include Logo</span>
                    </label>
                    <input type="file" id="logo-file" accept="image/*" class="form-input" style="display: none;">
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary btn-block" onclick="generateQR()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4z"/>
                    </svg>
                    Generate QR Code
                </button>
                <button class="btn btn-secondary btn-block" onclick="downloadQR()" id="download-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2z"/>
                    </svg>
                    Download QR Code
                </button>
            </div>
        </div>

        <div class="qr-preview-panel">
            <div class="preview-container">
                <div class="preview-placeholder" id="preview-placeholder">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zM19 13h2v2h-2zM13 13h2v2h-2zM15 15h2v2h-2zM13 17h2v2h-2zM15 19h2v2h-2zM17 17h2v2h-2zM17 13h2v2h-2zM19 15h2v2h-2z"/>
                    </svg>
                    <p>Select a URL to generate QR code</p>
                </div>
                <div class="preview-image" id="preview-image" style="display: none;">
                    <img id="qr-image" alt="QR Code">
                </div>
            </div>

            <div class="preview-info" id="preview-info" style="display: none;">
                <h4>QR Code Details</h4>
                <dl class="info-list">
                    <dt>URL:</dt>
                    <dd id="info-url">-</dd>
                    <dt>Size:</dt>
                    <dd id="info-size">-</dd>
                    <dt>Format:</dt>
                    <dd id="info-format">-</dd>
                </dl>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/qr.js"></script>
<script>
let currentQRData = null;

document.getElementById('qr-size').addEventListener('input', function() {
    document.getElementById('size-value').textContent = this.value;
});

document.getElementById('include-logo').addEventListener('change', function() {
    document.getElementById('logo-file').style.display = this.checked ? 'block' : 'none';
});

async function generateQR() {
    const urlId = document.getElementById('url-select').value;
    if (!urlId) {
        showNotification('Please select a URL', 'error');
        return;
    }

    const config = {
        size: parseInt(document.getElementById('qr-size').value),
        format: document.querySelector('input[name="format"]:checked').value,
        style: document.querySelector('input[name="style"]:checked').value,
        foreground_color: document.getElementById('fg-color').value,
        background_color: document.getElementById('bg-color').value
    };

    try {
        const response = await fetch(`/api/v1/urls/${urlId}/qr`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config)
        });

        if (response.ok) {
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            document.getElementById('preview-placeholder').style.display = 'none';
            document.getElementById('preview-image').style.display = 'block';
            document.getElementById('qr-image').src = url;
            document.getElementById('download-btn').disabled = false;

            currentQRData = { url, config, urlId };

            document.getElementById('preview-info').style.display = 'block';
            document.getElementById('info-url').textContent = urlId;
            document.getElementById('info-size').textContent = `${config.size}x${config.size}px`;
            document.getElementById('info-format').textContent = config.format.toUpperCase();

            showNotification('QR code generated successfully', 'success');
        } else {
            showNotification('Failed to generate QR code', 'error');
        }
    } catch (error) {
        showNotification('Error: ' + error.message, 'error');
    }
}

function downloadQR() {
    if (!currentQRData) return;

    const a = document.createElement('a');
    a.href = currentQRData.url;
    a.download = `qr-${currentQRData.urlId}.${currentQRData.config.format}`;
    a.click();

    showNotification('QR code downloaded', 'success');
}

function showNotification(message, type) {
    const flash = document.createElement('div');
    flash.className = `flash flash-${type}`;
    flash.innerHTML = `
        <div class="flash-content">
            <span class="flash-message">${message}</span>
        </div>
        <button class="flash-close" onclick="this.parentElement.remove()">×</button>
    `;

    let container = document.querySelector('.flash-messages');
    if (!container) {
        container = document.createElement('div');
        container.className = 'flash-messages';
        document.querySelector('.main-content').prepend(container);
    }

    container.appendChild(flash);
    setTimeout(() => flash.remove(), 3000);
}
</script>
{{end}}
