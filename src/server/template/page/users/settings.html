{{template "base" .}}
{{define "content"}}
<div class="container container-md">
  <h1 class="mb-4">Settings</h1>
  {{if .Flash}}
  <div class="alert alert-{{.Flash.Type}}" data-autohide="5000">{{.Flash.Message}}</div>
  {{end}}
  <div class="card mb-3">
    <h2 class="card-title">Display Preferences</h2>
    <form method="POST" action="/users/settings">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
      <div class="form-group">
        <label for="display_name">Display Name</label>
        <input class="form-control" type="text" id="display_name" name="display_name"
               value="{{.DisplayName}}" maxlength="80">
      </div>
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea class="form-control" id="bio" name="bio" rows="3" maxlength="500">{{.Bio}}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>
  <div class="card">
    <h2 class="card-title">Theme</h2>
    <p class="text-muted text-sm mb-3">Choose your preferred color scheme. Toggle via the navigation button.</p>
    <div class="flex gap-2">
      <button class="btn btn-outline btn-sm" onclick="localStorage.setItem('cl_theme','dark');location.reload()">Dark</button>
      <button class="btn btn-outline btn-sm" onclick="localStorage.setItem('cl_theme','light');location.reload()">Light</button>
      <button class="btn btn-outline btn-sm" onclick="localStorage.setItem('cl_theme','auto');location.reload()">Auto (System)</button>
    </div>
  </div>
</div>
{{end}}
