{{template "base" .}}
{{define "content"}}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-title">
      <h1>Create Account</h1>
      <p class="text-muted text-sm">Get started with your free account</p>
    </div>
    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/server/auth/register">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
      <div class="form-group">
        <label for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username"
               value="{{.Username}}" required autocomplete="username"
               pattern="[a-z0-9][a-z0-9\-]*[a-z0-9]" minlength="2" maxlength="39" autofocus>
        <div class="form-text">Lowercase letters, numbers, and hyphens. 2–39 characters.</div>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input class="form-control" type="email" id="email" name="email"
               value="{{.Email}}" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password"
               required autocomplete="new-password" minlength="8">
        <div class="form-text">At least 8 characters.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/server/auth/login">Sign in</a>
    </div>
  </div>
</div>
{{end}}
