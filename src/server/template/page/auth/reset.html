{{template "base" .}}
{{define "content"}}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-title">
      <h1>Set New Password</h1>
      <p class="text-muted text-sm">Choose a strong password for your account</p>
    </div>
    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}
    {{if .InvalidToken}}
    <div class="alert alert-danger">
      This reset link is invalid or has expired.
      <a href="/server/auth/password/forgot">Request a new one</a>.
    </div>
    {{else}}
    <form method="POST" action="/server/auth/password/reset/{{.Token}}">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
      <input type="hidden" name="token" value="{{.Token}}">
      <div class="form-group">
        <label for="password">New Password</label>
        <input class="form-control" type="password" id="password" name="password"
               required autocomplete="new-password" minlength="8" autofocus>
        <div class="form-text">At least 8 characters.</div>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input class="form-control" type="password" id="confirm_password" name="confirm_password"
               required autocomplete="new-password" minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Set New Password</button>
    </form>
    {{end}}
    <div class="auth-footer">
      <a href="/server/auth/login">Back to sign in</a>
    </div>
  </div>
</div>
{{end}}
