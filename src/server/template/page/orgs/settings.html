{{template "base" .}}
{{define "content"}}
<div class="container container-md">
  <div class="mb-4">
    <a href="/orgs/{{.Org.Slug}}/" class="text-muted text-sm">&larr; Back to Dashboard</a>
  </div>
  <h1 class="mb-4">Organization Settings</h1>
  {{if .Flash}}
  <div class="alert alert-{{.Flash.Type}}" data-autohide="5000">{{.Flash.Message}}</div>
  {{end}}

  <div class="card mb-4">
    <h2 class="card-title">General</h2>
    <form method="POST" action="/orgs/{{.Org.Slug}}/settings">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
      <input type="hidden" name="action" value="update">
      <div class="form-group">
        <label for="name">Organization Name <span class="text-danger">*</span></label>
        <input class="form-control" type="text" id="name" name="name"
               required minlength="3" maxlength="40"
               value="{{.Org.Name}}">
      </div>
      <div class="form-group">
        <label for="slug">Slug</label>
        <input class="form-control" type="text" id="slug" name="slug"
               value="{{.Org.Slug}}" readonly disabled>
        <span class="form-hint text-muted text-sm">Slug cannot be changed after creation.</span>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea class="form-control" id="description" name="description"
                  maxlength="500" rows="3">{{.Org.Description}}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>

  <div class="card card-danger">
    <h2 class="card-title text-danger">Danger Zone</h2>
    <p class="text-muted text-sm">Deleting this organization is permanent and cannot be undone. All links and data will be lost.</p>
    <button class="btn btn-danger btn-sm" onclick="showDeleteConfirm()">Delete Organization</button>
    <div id="delete-confirm" style="display:none;" class="mt-3">
      <form method="POST" action="/orgs/{{.Org.Slug}}/settings">
        <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
        <input type="hidden" name="action" value="delete">
        <div class="form-group">
          <label>Type <strong>{{.Org.Slug}}</strong> to confirm deletion</label>
          <input class="form-control" type="text" name="confirm_slug" id="confirm-slug"
                 required placeholder="{{.Org.Slug}}">
        </div>
        <button type="submit" class="btn btn-danger"
                onclick="return validateDeleteConfirm('{{.Org.Slug}}')">Permanently Delete Organization</button>
      </form>
    </div>
  </div>
</div>
<script>
function showDeleteConfirm() {
  document.getElementById('delete-confirm').style.display = 'block';
  document.getElementById('confirm-slug').focus();
}
function validateDeleteConfirm(expected) {
  var val = document.getElementById('confirm-slug').value;
  if (val !== expected) {
    alert('Organization slug does not match. Deletion cancelled.');
    return false;
  }
  return true;
}
</script>
{{end}}
