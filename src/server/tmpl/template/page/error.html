{{template "base" .}}
{{define "content"}}
<div class="auth-wrap">
  <div class="card auth-card" style="text-align:center">
    <h1 style="font-size:3rem;margin-bottom:.5rem">{{.Code}}</h1>
    <h2 class="mb-3">{{.Title}}</h2>
    <p class="text-muted mb-4">{{.Message}}</p>
    <a href="/" class="btn btn-primary">Go Home</a>
  </div>
</div>
{{end}}
