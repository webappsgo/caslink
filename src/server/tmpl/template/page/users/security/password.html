{{template "base" .}}
{{define "content"}}
<div class="container container-md">
  <div class="mb-4">
    <a href="/users/security" class="text-muted text-sm">&larr; Back to Security</a>
  </div>
  <div class="card">
    <h1 class="mb-4">Change Password</h1>
    {{if .Flash}}
    <div class="alert alert-{{.Flash.Type}}" data-autohide="5000">{{.Flash.Message}}</div>
    {{end}}
    <form method="POST" action="/users/security/password">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input class="form-control" type="password" id="current_password" name="current_password"
               required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input class="form-control" type="password" id="new_password" name="new_password"
               required minlength="8" autocomplete="new-password">
        <ul class="form-hint text-muted text-sm mt-1">
          <li>At least 8 characters</li>
          <li>Use a mix of letters, numbers, and symbols for a stronger password</li>
        </ul>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input class="form-control" type="password" id="confirm_password" name="confirm_password"
               required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary">Change Password</button>
    </form>
  </div>
</div>
{{end}}
