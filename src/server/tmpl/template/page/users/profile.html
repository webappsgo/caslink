{{template "base" .}}
{{define "content"}}
<div class="container container-md">
  <h1 class="mb-4">Profile</h1>
  {{if .Flash}}
  <div class="alert alert-{{.Flash.Type}}" data-autohide="5000">{{.Flash.Message}}</div>
  {{end}}
  <div class="card">
    <div class="form-group">
      <label class="text-muted text-sm">Username</label>
      <div>{{.User.Username}}</div>
    </div>
    <div class="form-group">
      <label class="text-muted text-sm">Email</label>
      <div>{{.User.Email}}
        {{if .User.EmailVerified}}
        <span class="badge badge-green">Verified</span>
        {{else}}
        <span class="badge badge-gray">Unverified</span>
        {{end}}
      </div>
    </div>
    <div class="form-group">
      <label class="text-muted text-sm">Member since</label>
      <div>{{.User.CreatedAt}}</div>
    </div>
    <div class="mt-3">
      <a href="/users/settings" class="btn btn-outline btn-sm">Edit Settings</a>
      <a href="/users/security" class="btn btn-outline btn-sm">Security</a>
    </div>
  </div>
</div>
{{end}}
