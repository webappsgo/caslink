{{template "base" .}}
{{define "content"}}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-title">
      <h1>Sign In</h1>
      <p class="text-muted text-sm">Enter your username or email and password</p>
    </div>
    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/server/auth/login">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
      <div class="form-group">
        <label for="identifier">Username or Email</label>
        <input class="form-control" type="text" id="identifier" name="identifier"
               value="{{.Identifier}}" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password"
               required autocomplete="current-password">
      </div>
      <div class="form-group form-check">
        <input type="checkbox" id="remember_me" name="remember_me">
        <label for="remember_me">Remember me for 30 days</label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <div class="auth-footer">
      <a href="/server/auth/password/forgot">Forgot your password?</a>
      &nbsp;&middot;&nbsp;
      <a href="/server/auth/register">Create an account</a>
    </div>
  </div>
</div>
{{end}}
