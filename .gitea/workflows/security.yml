name: Security

on:
  push:
    branches:
      - main
      - master
      - devel
      - dev
      - beta
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/devel' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/beta' }}

jobs:
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0  # Full history required for secret scanning

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}
          head: HEAD
          extra_args: --debug --only-verified

  vuln-scan:
    name: Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install dependencies
        run: apk add --no-cache git

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  workflow-pin-check:
    name: Workflow SHA Pin Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check all third-party actions are pinned to SHA
        run: |
          FAILURES=0
          while IFS= read -r file; do
            while IFS= read -r line; do
              action=$(echo "$line" | sed -E 's/.*uses:\s*([^ ]+).*/\1/')
              if ! echo "$action" | grep -qE '^[a-zA-Z0-9_-]+/[a-zA-Z0-9_.-]+@'; then
                continue
              fi
              ref=$(echo "$action" | cut -d@ -f2 | cut -d' ' -f1)
              if ! echo "$ref" | grep -qE '^[0-9a-f]{40}$'; then
                echo "::error file=${file}::Unpinned action: ${action} (use a full SHA, not a tag)"
                FAILURES=$((FAILURES + 1))
              fi
            done < <(grep -E '^\s+uses:' "$file" || true)
          done < <(find .gitea/workflows -name '*.yml' -o -name '*.yaml')
          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::${FAILURES} workflow(s) use unpinned actions. Pin all third-party actions to full commit SHAs."
            exit 1
          fi
          echo "All third-party actions are pinned to full SHAs."
