version: '3.8'

services:
  caslink:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile
    ports:
      - "64000:64000"
    volumes:
      - caslink-data:/var/lib/caslink
      - ./config.toml:/app/config.toml:ro
    environment:
      - CASLINK_SERVER_HOST=0.0.0.0
      - CASLINK_SERVER_PORT=64000
      - CASLINK_DATABASE_URL=sqlite:///var/lib/caslink/caslink.db
      - CASLINK_DATABASE_AUTO_MIGRATE=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "./caslink-cli", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - caslink

volumes:
  caslink-data:

networks:
  caslink:
    driver: bridge