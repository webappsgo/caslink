version: '3.8'

services:
  caslink:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile.prod
      target: production
      args:
        VERSION: ${VERSION:-latest}
        COMMIT: ${COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    ports:
      - "64000:64000"
    volumes:
      - caslink-data:/var/lib/caslink
    environment:
      - CASLINK_SERVER_HOST=0.0.0.0
      - CASLINK_SERVER_PORT=64000
      - CASLINK_DATABASE_TYPE=postgresql
      - CASLINK_DATABASE_HOST=postgres
      - CASLINK_DATABASE_PORT=5432
      - CASLINK_DATABASE_NAME=caslink
      - CASLINK_DATABASE_USERNAME=caslink
      - CASLINK_DATABASE_PASSWORD_FILE=/run/secrets/db_password
      - CASLINK_DATABASE_AUTO_MIGRATE=true
      - CASLINK_REDIS_ENABLED=true
      - CASLINK_REDIS_URL=redis://redis:6379
    secrets:
      - db_password
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "./caslink-cli", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - caslink
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=caslink
      - POSTGRES_USER=caslink
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caslink"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caslink
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - caslink
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - caslink
    restart: unless-stopped
    networks:
      - caslink

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  caslink-data:
  postgres-data:
  redis-data:

networks:
  caslink:
    driver: bridge